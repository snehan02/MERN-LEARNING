<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Student Grade Calculator</h2>
    <label>Subject 1 : </label>
    <input type="number" id="sub1" /> <br />
    <label>Subject 2 : </label>
    <input type="number" id="sub2" /> <br />
    <label>Subject 3 : </label>
    <input type="number" id="sub3" /> <br />
    <br>

    <button onclick="calculateGrade()">Calculate</button>
    <h3 id="total"></h3>
    <h3 id="average"></h3>
    <h3 id="grade"></h3>

    <script>
      function calculateGrade() {
        let s1 = Number(document.getElementById("sub1").value);
        let s2 = Number(document.getElementById("sub2").value);
        let s3 = Number(document.getElementById("sub3").value);

        let total = s1 + s2 + s3;
        let average = total / 3;
        let grade;

        if (average > 90) {
          grade = "A";
        } else if (average >= 75) {
          grade = "B";
        } else if (average >= 60) {
          grade = "C";
        } else if (average >= 40) {
          grade = "D";
        } else {
          grade = "F";
        }
        document.getElementById("total").innerHTML = "Total: " + total;
        document.getElementById("average").innerHTML = "average:" + average;
        document.getElementById("grade").innerHTML = "Grade: " + grade;
      }
    </script>
  </body>
</html>
